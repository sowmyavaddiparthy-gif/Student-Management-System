<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Students</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="students.css">
    <link rel="stylesheet" href="https://unicons.iconscout.com/release/v4.2.0/css/line.css">
</head>
<body>

    <!-- SAME SIDEBAR -->
    <nav>
        <div class="logo-name">
            <div class="logo-image">
                <img src="logo.png" alt="">
            </div>

            <span class="logo_name">Student Portal</span>
        </div>

       <div class="menu-items">
       <ul class="nav-links">
        <li><a href="index.html">
            <i class="uil uil-house-user"></i>
            <span class="link-name">Dashboard</span>
        </a></li>
        <li><a href="students.html">
            <i class="uil uil-book-reader"></i>
            <span class="link-name">Students</span>
        </a></li>
        
        <li class="mode">
            <a href="#">
          <i class="uil uil-moon"></i>
            <span class="link-name">Dark Mode</span>
        </a>

        <div class="mode-toggle">
        <span class="switch"></span>
        </div>
    </li>
       </ul>
       </div>
    </nav>

    <!-- MAIN CONTENT -->
    <section class="dashboard">

        <!-- SAME TOP BAR -->
        <div class="top">
            <i class="uil uil-bars sidebar-toggle"></i>

            <div class="search-box">
                <i class="uil uil-search"></i>
                <input type="text" placeholder="Search here...">
            </div>
            <img src="profile.png" alt="">
        </div>

        
        <div class="dash-content">

            <div class="title">
                <i class="uil uil-laptop"></i>
                <span class="text">Student Data</span>
            </div>

            <!-- YOUR FORM -->
            <div class="student-form">
                <div class="form-card">
        <h3>Student Details</h3>

        <form id="form">

            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="name" placeholder="Enter full name">
            </div>

            <div class="input-group">
                <label>Registration No</label>
                <input type="text" id="roll" placeholder="Enter reg number">
            </div>

            <div class="input-group">
                <label>Course</label>
                <input type="text" id="course" placeholder="Enter course">
            </div>

            <div class="input-group">
                <label>Year</label>
                <input type="text" id="year" placeholder="Enter year">
            </div>

            <div class="input-group">
                <label>Contact</label>
                <input type="text" id="contact" placeholder="Enter contact">
            </div>

            <div class="form-buttons">
                <button type="submit">Save</button>
                <button type="reset">Reset</button>
            </div>

        </form>
    </div>

</div>

<!-- BOTTOM HALF (TABLE) -->
<div class="student-table">

    <div class="table-card">
        <table>
            <thead>
                <tr>
                    <th>Full Name</th>
                    <th>Registration</th>
                    <th>Course</th>
                    <th>Year</th>
                    <th>Contact</th>
                    <th>Edit</th>
                    <th>Delete</th>
                </tr>
            </thead>

            <tbody id="student-list">
            
            </tbody>
        </table>
    </div>

</div>

    </section>
  <script src="students.js"></script>
</body>
</html>
